<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito de Compras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header class="custom-header">

    <div class="header-container">

        <div class="logo-area">
            <img src="images/logo.png" alt="Logo Tienda Tech JAR" class="logo">
            <h1>Carrito de compras</h1>
        </div>

        <div class="user-box">
            <i class="fas fa-user-circle"></i>
            <span id="usuarioLogueado"></span>
        </div>

    </div>

</header>
    <nav class="nav-menu">
        <ul class="nav-list">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li id="menuClientes" style="display:none;"><a href="clientes.html">Clientes</a></li>
            <li id="menuEmpleados" style="display:none;"><a href="empleados.html">Empleados</a></li>
            <li style="position: relative;">
                <a href="carrito.html" id="iconoCarrito">
                     Carrito
                    <span id="contadorCarrito" class="badge">0</span>
                </a>
            </li>
             <li id="menuContacto"><a href="contacto.html">Contacto</a></li>
            <li><a href="#" onclick="logout()">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <main class="container mt-4">
        <section>
            <div class="mb-3">
                <h2>Seleccionar Cliente:</h2>
                <p id="clienteSeleccionado"></p>
                <select id="selectCliente" class="form-control"></select>
            </div>
            <h2 class="mb-3">Productos en el Carrito</h2>

            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tbodyCarrito">
                    
                </tbody>
            </table>

            <div class="text-end">
                <!--  TOTAL -->
                <h4>Total: <span id="total">₡0</span></h4>

                <button id="btnFinalizar" class="btn btn-success">
                    Finalizar Compra
                </button>
            </div>

        </section>
    </main>

    <footer class="text-center p-3">
        <p>&copy; 2026 Tienda de accesorios de PC</p>
        <p>Contacto: <a href="mailto:jarley@gmail.com">Jarley</a></p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/carrito.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/carrito-utils.js"></script>

</body>

</html>
