<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap + Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- HEADER -->
    <header class="bg-success text-white text-center p-3">
        <h1>Registro de Cliente</h1>
    </header>

    <!-- NAV -->
    <nav class="nav-menu">
        <ul class="nav-list">
            <li><a href="login.html">Volver al Login</a></li>
        </ul>
    </nav>

    <!-- CONTENIDO -->
    <main class="container mt-5">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h3 class="text-center mb-3">
                        <img src="images/logo.png" alt="Logo Tienda Tech JAR" class="logo"
            style="width:120px; height:auto; margin-bottom:1px;">
                        <i class="fas fa-user-plus"></i> Crear Cuenta
                    </h3>

                    <!-- NOMBRE -->
                    <input type="text" id="txtNombre" class="form-control mb-3" placeholder="Nombre completo">

                    <!-- CORREO -->
                    <input type="email" id="txtCorreo" class="form-control mb-3" placeholder="Correo electrónico">

                    <!-- PASSWORD -->
                    <div class="input-group mb-3">
                        <input type="password" id="txtPassword" class="form-control" placeholder="Contraseña">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <!-- CONFIRMAR PASSWORD -->
                    <div class="input-group mb-3">
                        <input type="password" id="txtConfirmPassword" class="form-control"
                            placeholder="Confirmar contraseña">
                        <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <!-- TELEFONO -->
                    <input type="text" id="txtTelefono" class="form-control mb-3" placeholder="Teléfono (opcional)">

                    <!-- BOTONES -->
                    <div class="d-grid gap-2">

                        <button id="btnRegistrar" class="btn btn-success">
                            <i class="fas fa-user-check"></i> Registrarse
                        </button>

                        <button onclick="window.location.href='login.html'" class="btn btn-secondary">
                            Volver
                        </button>

                    </div>

                </div>

            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="text-center p-3 mt-4">
        <p>&copy; 2026 Tienda de accesorios de PC</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/register.js"></script>

</body>

</html>
