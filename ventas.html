<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tienda virtual JAR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header class="custom-header">

        <div class="header-container">

            <!-- IZQUIERDA -->
            <div class="logo-area">
                <img src="images/logo.png" alt="Logo Tienda Tech JAR" class="logo">
                <h1>Tienda Tech JAR</h1>
            </div>

            <!-- DERECHA -->
            <div class="user-box">
                <i class="fas fa-user-circle"></i>
                <span id="usuarioLogueado"></span>
            </div>

        </div>

    </header>



    <nav class="nav-menu">
        <ul class="nav-list">
            <li><a href="index.html">Volver al inicio</a></li>

        </ul>
    </nav>

    <div class="container mt-4">
        <h2>Bitácora de Ventas</h2>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tbodyVentas"></tbody>
        </table>
    </div>

    <!-- MODAL DETALLE -->
    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detalle de Venta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div id="infoVenta"></div>

                    <table class="table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyDetalle"></tbody>
                    </table>

                    <h4 id="totalDetalle" class="text-end"></h4>
                </div>

            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Tienda de accesorios de PC</p>
        <p>Contacto: <a href="mailto:jarley@gmail.com">Jarley</a></p>

    </footer>

    <script type="module" src="js/ventas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script type="module" src="js/auth.js"></script>

</body>

</html>
